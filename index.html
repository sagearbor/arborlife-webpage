<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArborLife — Design Mockups</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 2rem; box-sizing: border-box; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p { color: #aaa; margin-bottom: 2rem; text-align: center; }
    .cards { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 420px; }
    a.card { display: block; padding: 1.2rem 1.5rem; border-radius: 12px; text-decoration: none; color: #fff; transition: transform 0.15s; }
    a.card:hover { transform: scale(1.02); }
    a.card h2 { margin: 0 0 0.3rem; font-size: 1.1rem; }
    a.card p { margin: 0; font-size: 0.85rem; color: rgba(255,255,255,0.7); }
    .c1 { background: linear-gradient(135deg, #1a2a1a, #2a3a1a); border: 1px solid #3a5a2a; }
    .c2 { background: linear-gradient(135deg, #1a1a2a, #2a2a3a); border: 1px solid #4a4a6a; }
    .c3 { background: linear-gradient(135deg, #2a1a3a, #1a2a4a); border: 1px solid #6a3a8a; }
  </style>
</head>
<body>
  <h1>ArborLife</h1>
  <p>Three design directions — tap to preview</p>
  <div class="cards">
    <a class="card c1" href="mockups/mockup-1-neural-garden.html">
      <h2>🌿 Neural Garden</h2>
      <p>Dark, organic + tech. Particle network, green/gold palette.</p>
    </a>
    <a class="card c2" href="mockups/mockup-2-clean-showcase.html">
      <h2>✦ Clean Showcase</h2>
      <p>Light, minimal, professional. Serif headings, whitespace-driven.</p>
    </a>
    <a class="card c3" href="mockups/mockup-3-bold-hub.html">
      <h2>⚡ Bold Hub</h2>
      <p>Dark with vibrant gradients. Glass-morphism, high-energy.</p>
    </a>
  </div>
</body>
</html>
